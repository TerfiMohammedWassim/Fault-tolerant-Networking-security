#      debug:
#        msg: "{{ ping_m2.stdout_lines[-3:] if ping_m2.stdout_lines is defined else 'Machine2 non joignable' }}"
    
    # ════════════════════════════════════════════════════════════════════
    # 6. RÉSUMÉ FINAL
    # ════════════════════════════════════════════════════════════════════

    - name: "[CHECK] Résumé final Machine1"
      debug:
        msg:
          - "════════════════════════════════════════════"
          - "  Machine1 configurée — RÉSUMÉ"
          - "════════════════════════════════════════════"
          - "  Bond          : {{ bond.name }} (802.3ad)"
          - "  Membres       : {{ bond.members | join(' + ') }}"
          - "  Membres UP    : {{ members_up }} / {{ bond.members | length }}"
          - "  IP bond0      : {{ bond.ip }}"
          - "  Passerelle    : {{ bond.gateway }} (SW3/SW4 SVI VLAN10)"
          - "  Route M2      : 192.168.2.0/24 via {{ bond.gateway }}"
          - "  Mgmt OOB      : {{ mgmt_iface }} (DHCP NAT)"
          - "════════════════════════════════════════════"
