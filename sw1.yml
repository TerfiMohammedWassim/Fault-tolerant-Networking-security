# ═══════════════════════════════════════════════════════════════════════════
# PLAYBOOK AUTONOME — SW1 (Cumulus Linux 4.x)
# Rôle : Access switch MLAG primary
# Interfaces : swp1 → NAT  (gestion Ansible OOB)
#              swp2 → LAN1 (M1 ens33, M2 ens33)
#              swp3 → LAN2 (M1 ens34, M2 ens34)
#              swp4 → LAN3 (peerlink vers SW2)
# Usage : ansible-playbook sw1.yml -u cumulus -k --become
# ═══════════════════════════════════════════════════════════════════════════
---
  
- name: Configuration complète SW1
  hosts: sw1
  gather_facts: false
  become: true

  vars:
  
    ansible_pipelining: true
    loopback_ip: "10.10.10.1/32"

    mlag:
      role: primary
      sys_mac: "44:38:39:FF:01:01"
      peerlink_name: peerlink
      peerlink_members:
        - swp4                       # LAN3 — lien dédié SW1 ↔ SW2
      peerlink_ip: "169.254.1.1/30"
      peer_ip: "169.254.1.2"
      backup_ip: "10.10.10.2"        # loopback SW2
      keepalive_ip: "10.10.10.1/32"

    # Un bond par machine — chaque bond agrège les deux ports LAN (swp2+swp3)
    # VLAN différent par machine pour isoler le trafic sur les LAN segments partagés.

    mlag_bonds:
      - name: bond_m1
        slaves:
          - swp2                     # LAN1 → M1.ens33
          - swp3                     # LAN2 → M1.ens34
        clag_id: 1
        vlan: 10
      - name: bond_m2
        slaves:
          - swp2                     # LAN1 → M2.ens33
          - swp3                     # LAN2 → M2.ens34
        clag_id: 2
        vlan: 20

    bridge:
      name: bridge
      vids: "10,20"
      pvid: 1

    sysctl_settings:
      - { name: net.ipv4.ip_forward,          value: "0" }
      - { name: net.core.netdev_max_backlog,   value: "1000" }


  tasks:
  
    - name: "[SYS] Bootstrap Python"
      raw: apt-get install -y python3 2>/dev/null || true
      changed_when: false

    # ════════════════════════════════════════════════════════════════════
    # 1. PARAMÈTRES SYSTÈME
    # ════════════════════════════════════════════════════════════════════

    - name: "[SYS] Appliquer les paramètres sysctl"
      raw: |
        mkdir -p /etc/sysctl.d
        sysctl -w net.ipv4.ip_forward=0
        sysctl -w net.core.netdev_max_backlog=1000
        printf 'net.ipv4.ip_forward = 0\nnet.core.netdev_max_backlog = 1000\n' \
          > /etc/sysctl.d/99-campus.conf
      changed_when: true

    # ════════════════════════════════════════════════════════════════════
    # 2. INTERFACES RÉSEAU
    # ════════════════════════════════════════════════════════════════════

    - name: "[NET] Déployer /etc/network/interfaces"
      copy:
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        content: |
          # Généré par Ansible — {{ lookup('pipe', 'date') }}
          # MLAG primary
          #   swp1 → NAT  (OOB mgmt)
          #   swp2 → LAN1 (M1+M2 ens33)
          #   swp3 → LAN2 (M1+M2 ens34)
          #   swp4 → LAN3 (peerlink SW1↔SW2)

          auto lo
          iface lo inet loopback
              address {{ mlag.keepalive_ip }}

          # ── Gestion OOB (NAT) ─────────────────────────────────────────
          auto eth0
          iface eth0 inet dhcp

          auto swp1
          iface swp1 inet dhcp

          # ── Membre du peerlink ────────────────────────────────────────
          {% for port in mlag.peerlink_members %}
          auto {{ port }}
          iface {{ port }}

          {% endfor %}
          # ── Peerlink bond (SW1 ↔ SW2 via LAN3/swp4) ──────────────────
          auto {{ mlag.peerlink_name }}
          iface {{ mlag.peerlink_name }}
              bond-slaves {{ mlag.peerlink_members | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1

          # ── Sous-interface MLAG ───────────────────────────────────────
          auto {{ mlag.peerlink_name }}.4094
          iface {{ mlag.peerlink_name }}.4094
              clagd-enable yes
              clagd-peer-ip {{ mlag.peer_ip }}
              clagd-backup-ip {{ mlag.backup_ip }}
              clagd-sys-mac {{ mlag.sys_mac }}
              address {{ mlag.peerlink_ip }}

          # ── Ports accès LAN1+LAN2 (bridge-access par VLAN) ───────────
          # swp2 et swp3 sont déclarés comme ports trunk dans le bridge.
          # La séparation M1 (VLAN10) / M2 (VLAN20) est gérée par
          # le bridge VLAN-aware + les clag-bonds sur SW2 côté uplink.
          auto swp2
          iface swp2

          auto swp3
          iface swp3

          # ── Bonds MLAG ────────────────────────────────────────────────
          {% for bond in mlag_bonds %}
          auto {{ bond.name }}
          iface {{ bond.name }}
              bond-slaves {{ bond.slaves | join(' ') }}
              bond-mode 802.3ad
              bond-miimon 100
              bond-lacp-rate fast
              bond-min-links 1
              clag-id {{ bond.clag_id }}
              bridge-access {{ bond.vlan }}

          {% endfor %}
          # ── Bridge VLAN-aware ─────────────────────────────────────────
          auto {{ bridge.name }}
          iface {{ bridge.name }}
              bridge-vlan-aware yes
              bridge-ports {{ mlag_bonds | map(attribute='name') | join(' ') }} {{ mlag.peerlink_name }}
              bridge-vids {{ bridge.vids }}
              bridge-pvid {{ bridge.pvid }}

    # ════════════════════════════════════════════════════════════════════
    # 3. RECHARGEMENT ET MLAG
    # ════════════════════════════════════════════════════════════════════

    - name: "[MLAG] Recharger les interfaces"
      command: ifreload -a
      changed_when: true

    - name: "[MLAG] Attendre le démarrage de clagd (8s)"
      wait_for:
        timeout: 8

    - name: "[MLAG] Vérifier l'état clagd"
      command: clagctl status
      register: clag_status
      changed_when: false
      ignore_errors: true

    - name: "[MLAG] Afficher l'état MLAG"
      debug:
        msg: "{{ clag_status.stdout_lines }}"

    - name: "[MLAG] Vérifier que le peer SW2 est alive"
      assert:
        that: "'peer is alive' in clag_status.stdout"
        fail_msg: "AVERTISSEMENT : peer SW2 non détecté (normal si SW2 pas encore configuré)"
        success_msg: "OK : peer SW2 détecté ✓"
      ignore_errors: true

    # ════════════════════════════════════════════════════════════════════
    # 4. VÉRIFICATION FINALE
    # ════════════════════════════════════════════════════════════════════

    - name: "[CHECK] État de toutes les interfaces"
      command: net show interface all
      register: iface_all
      changed_when: false
      ignore_errors: true

    - name: "[CHECK] Afficher les interfaces"
      debug:
        msg: "{{ iface_all.stdout_lines }}"

    - name: "[CHECK] VLANs sur le bridge"
      command: bridge vlan show
      register: bridge_vlans
      changed_when: false

    - name: "[CHECK] Afficher les VLANs"
      debug:
        msg: "{{ bridge_vlans.stdout_lines }}"

    - name: "[CHECK] Résumé final SW1"
      debug:
        msg:
          - "════════════════════════════════════"
          - "  SW1 configuré — RÉSUMÉ"
          - "════════════════════════════════════"
          - "  Loopback    : {{ mlag.keepalive_ip }}"
          - "  MLAG rôle   : {{ mlag.role }}"
          - "  Peerlink    : {{ mlag.peerlink_members | join('+') }} (LAN3/swp4)"
          - "  Peer IP     : {{ mlag.peer_ip }}"
          - "  Backup IP   : {{ mlag.backup_ip }}"
          - "  bond_m1     : swp2+swp3 → VLAN10 (Machine1)"
          - "  bond_m2     : swp2+swp3 → VLAN20 (Machine2)"
          - "  OOB mgmt    : swp1 (NAT DHCP)"
          - "════════════════════════════════════"